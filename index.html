<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripts Library - Copy & Paste</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📋 Scripts Library</h1>
            <p>Click on any script card to copy it instantly</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-box" 
                placeholder="Search scripts..."
                onkeyup="filterScripts()"
            >
        </div>

        <div class="scripts-grid" id="scriptsGrid">
            <!-- Script cards will be generated here -->
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
